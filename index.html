<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Services</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=login" />
</head>

<body>
    <header>
        <nav class="nav-baar">
            <div class="logo">
                <h2>Logo</h2>
            </div>
            <div class="menu-baar">
                <ul>
                    <li>Home</li>
                    <li>Service</li>
                    <li>Contact Us</li>
                    <li>About Us</li>
                </ul>
            </div>
            <div class="login-button">
                <button class="login-btn">
                    <span id="text" class="btn-text">Username</span>
                    <span id="icon" class="material-symbols-outlined">
                        login
                    </span>
                </button>
            </div>
        </nav>
    </header>


    <div class="container">
        <div class="cart">

            <div class="add-items">
                <div class="heading">
                    <h2>Added Items</h2>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>S.No</th>
                            <th>Service</th>
                            <th>Price</th>
                        </tr>
                    </thead>

                    <tbody id="cartItems"></tbody>
                </table>

                <h3>
                    <span>Total Amount</span>
                    <span>₹ <span id="total">0</span></span>
                </h3>
            </div>

            <div class="book-now">
                <h4>Book Now</h4>
                <div class="booking-container">

                    <div class="input-group full">
                        <label>Full Name</label>
                        <input type="text" placeholder="Enter Name" required>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Email ID</label>
                            <input type="email" placeholder="mail@gmail.com" required>
                        </div>

                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="number" placeholder="+123.." required>
                        </div>
                    </div>

                    <button class="book-btn">Book Now</button>
                    <div class="message"></div>

                </div>
            </div>

        </div>

        <div class="service">

            <div class="top-heading">
                <h2>Browse Our Services</h2>
                <p>Click on the add to cart button to add the services to your cart or press skip </p>
            </div>


            <img id="serviceImage" src="" alt="">


            <h3 id="serviceName"></h3>

            <h2>₹ <span id="servicePrice"></span></h2>



            <div class="buttons">
                <button id="skipBtn">Skip</button>
                <button id="addBtn">Add Item</button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
